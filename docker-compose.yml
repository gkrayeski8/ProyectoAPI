version: '3.8'

services:
  # Servicio de la Base de Datos (MySQL)
  db:
    image: mysql:8.0
    container_name: ecommerce_db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=ecommerce_db3
      - MYSQL_ROOT_PASSWORD=root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  # Servicio de la Aplicación Spring Boot (API)
  app:
    build: .
    container_name: ecommerce_api
    ports:
      - "8081:8080"
    environment:
      # Sobrescribimos las variables definidas en tu application.properties
      # para apuntar al nombre del contenedor de la BD ('db') en lugar de localhost
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/ecommerce_db3?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
